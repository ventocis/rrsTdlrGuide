name: Deploy stack on tag push

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/util-deploy.yml
    with:
      # Must be prod so `make deploy ENV=prod` runs `generate:prod` (SEO on, Allow: /).
      # QA uses the manual workflow with environment qa.
      environment: prod
      version_tag: ${{ github.ref_name }}
