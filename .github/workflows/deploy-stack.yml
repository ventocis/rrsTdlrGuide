name: Deploy stack on tag push

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/util-deploy.yml
    with:
      # Tags are created by "Version Bump on Merges" after pushes to main → deploy QA automatically.
      # Production (txcourseguide.com, SEO on) is deployed only via "Deploy to environment (manual)" with environment prod.
      environment: qa
      version_tag: ${{ github.ref_name }}
